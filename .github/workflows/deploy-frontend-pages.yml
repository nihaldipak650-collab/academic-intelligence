name: Validate and deploy frontend 1.0 to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy the validated frontend/dist artifact to GitHub Pages"
        required: true
        type: boolean
        default: false
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "web/advisors.json"
      - "web/reports/**"
      - ".github/workflows/deploy-frontend-pages.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build frontend 1.0
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use Node LTS
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Synchronize reviewed advisor data
        working-directory: frontend
        run: npm run sync:data

      - name: Validate generated advisor data
        working-directory: frontend
        run: npm run validate:data

      - name: Run frontend test suite
        working-directory: frontend
        run: npm run test

      - name: Build production site
        working-directory: frontend
        run: npm run build

      - name: Verify GitHub Pages artifact contents
        shell: bash
        run: |
          set -euo pipefail
          test -s frontend/dist/index.html
          test -s frontend/dist/data/advisors.json
          test -s frontend/dist/data/site-config.json
          node --input-type=module - <<'NODE'
          import { existsSync, readFileSync, readdirSync } from "node:fs";

          const data = JSON.parse(
            readFileSync("frontend/dist/data/advisors.json", "utf8"),
          );
          if (data.advisorCount !== 7 || data.advisors.length !== 7) {
            throw new Error("Pages artifact must contain exactly 7 advisors");
          }

          const reportDirectory = "frontend/dist/reports";
          const reportFiles = readdirSync(reportDirectory).filter((name) =>
            name.endsWith(".md"),
          );
          if (reportFiles.length !== 7) {
            throw new Error("Pages artifact must contain exactly 7 Markdown reports");
          }

          for (const advisor of data.advisors) {
            if (
              !advisor.reportPath.startsWith("reports/") ||
              !existsSync(`frontend/dist/${advisor.reportPath}`)
            ) {
              throw new Error(`Missing report for advisor ${advisor.id}`);
            }
          }

          console.log("Verified Pages artifact: 7 advisors and 7 reports");
          NODE

      - name: Upload frontend 1.0 artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./frontend/dist

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
    name: Deploy frontend 1.0
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
